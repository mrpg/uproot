{% extends "Admin.html" %}

{% block titlearea %}

<div class="align-center d-flex justify-content-between my-4" id="title-container">
    <h2 id="uproot-title" class="fw-semibold">
        {% translate %}
        Session
        {% endtranslate %}
        <a href="../" class="font-monospace link-subtle">{{ sname }}</a>
        <span class="fw-light text-secondary">&gt; {% translate %}Pipelines{% endtranslate %}</span>
    </h2>
</div>

{% endblock titlearea %}


{% block main3 %}

{% for appname in apps %}

<h3>{{ appname }}</h3>

<div class="mb-5">
    <div class="btn-group">
        <button
            type="button"
            class="btn btn-outline-uproot"
            onclick="uprootRunPipeline('{{ appname | urlencode }}', 'csv')"
        >{% translate %}Run pipeline{% endtranslate %}</button>
        <button type="button" class="btn btn-outline-uproot dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false"></button>
        <ul class="dropdown-menu">
            <li>
                <button class="dropdown-item" type="button" onclick="uprootRunPipeline('{{ appname | urlencode }}', 'csv')">CSV</button>
            </li>
            <li>
                <button class="dropdown-item" type="button" onclick="uprootRunPipeline('{{ appname | urlencode }}', 'jsonl')">JSONL</button>
            </li>
        </ul>
    </div>
</div>

{% endfor %}

<script>
async function uprootRunPipeline(appname, filetype) {
    const response = await fetch(`${appname}/run/?filetype=${filetype}`);
    const disposition = response.headers.get("content-disposition") || "";

    if (!response.ok) {
        alert(await response.text());
        return;
    }

    if (!disposition.includes("attachment")) {
        alert(await response.text());
        return;
    }

    const blob = await response.blob();
    const match = disposition.match(/filename="?([^"]+)"?/);
    const filename = match ? match[1] : `pipeline.${filetype}`;
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    URL.revokeObjectURL(link.href);
    link.remove();
}
</script>

{% endblock main3 %}
